<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta http-equiv="Content-Type" content='text/html; charset=UTF-8' />
		<title>検索結果</title>
		<link rel='stylesheet' type="text/css" href="style.css" />
	</head>
	<body>
		<h3>キーワード "麦わら帽子" カテゴリ "帽子" の検索結果</h3>
		<br />
		<table>
			<tr>
				<th>商品名</th>
				<th>商品の色</th>
				<th>メーカー名</th>
				<th>価格</th>
			</tr>
			<tr th:each="item : ${list}" th:object="${item}">
				<td><a th:href="@{/items/detail(itemId=*{itemId})}" th:text="*{itemName}">ぼうし</a></td>
				<td th:text="*{color}">黄色</td>
				<td th:text="*{manufacturer}">日本帽子製造</td>
				<td th:text="*{price}">4980円</td>
			</tr>
			
		</table>

</html>
